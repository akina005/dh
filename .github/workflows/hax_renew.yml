name: Hax Auto Renew Logic

on:
  schedule:
    - cron: '20 18 */3 * *'
  workflow_dispatch:

jobs:
  hax-renewal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64 \
          libpango-1.0-0 libcairo2 libgl1 libglib2.0-0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyrogram tgcrypto requests loguru

      - name: Run Hax Task
        id: hax_run
        continue-on-error: true  # 必须开启，允许报错后执行下一步换IP逻辑
        env:
          TG_STRING_SESSION: ${{ secrets.TG_STRING_SESSION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME }}
          PYTHONPATH: ${{ github.workspace }}
        run: python hax_renw.py  # 这里注意脚本文件名是否带 _us

      - name: Change IP and Restart Workflow
        if: steps.hax_run.outcome == 'failure' && github.run_attempt < 6
        run: |
          echo "检测到任务失败，准备换 IP 重试（当前第 ${{ github.run_attempt }} 次）"
          
          # 直接使用你不会改的名字进行匹配，并加上双引号防止空格报错
          WORKFLOW_NAME="Hax Auto Renew Logic"
          
          # 获取对应的 ID
          WORKFLOW_ID=$(curl -s -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows" \
            | jq -r ".workflows[] | select(.name==\"$WORKFLOW_NAME\") | .id")

          echo "目标工作流 ID: $WORKFLOW_ID"

          # 执行重启
          curl -L -i -X POST \
            -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}'
          
          exit 1
